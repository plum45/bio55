<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Medical Explore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #040914;
            --panel-bg: rgba(10, 15, 30, 0.65);
            --border: rgba(255,255,255,0.08);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Kanit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        .bg-animation {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.1) 0%, transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
            animation: rotateBg 30s linear infinite; z-index: -1; pointer-events: none;
        }
        @keyframes rotateBg { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Sidebar */
        #sidebar {
            width: 350px; background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10;
        }
        .sidebar-header { padding: 2rem 1.5rem 1rem 1.5rem; }
        .logo { font-size: 1.5rem; font-weight: 600; color: #fff; margin-bottom: 0.2rem; display: flex; align-items: center; gap: 10px;}
        .sub-logo { font-size: 0.85rem; color: var(--text-sub); margin-bottom: 1.5rem;}
        
        .search-box { position: relative; width: 100%; }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px 15px 12px 40px; border-radius: 8px; font-family: inherit;
            font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-sub); }

        #model-list { flex-grow: 1; overflow-y: auto; padding: 0 1rem; }
        #model-list::-webkit-scrollbar { width: 4px; }
        #model-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .model-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px;
            padding: 1rem; margin-bottom: 12px; cursor: pointer; display: flex; gap: 15px; transition: all 0.3s ease;
        }
        .model-card:hover { transform: translateY(-3px); border-color: rgba(14, 165, 233, 0.4); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .model-card.active { background: rgba(14, 165, 233, 0.1); border-color: var(--accent); }
        .model-icon {
            font-size: 24px; width: 50px; height: 50px; background: rgba(0,0,0,0.4); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05);
        }
        .model-info h3 { font-size: 1.05rem; font-weight: 500; margin-bottom: 4px; }
        .model-info p { font-size: 0.85rem; color: var(--text-sub); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Main View */
        #main-view { flex-grow: 1; position: relative; background: transparent; overflow: hidden; }
        #three-canvas { width: 100%; height: 100%; outline: none; cursor: grab; }
        #three-canvas:active { cursor: grabbing; }

        /* Number Badges */
        .hs-badge {
            position: absolute;
            top: 0; left: 0;
            width: 36px; height: 36px;
            background: linear-gradient(135deg, rgba(2, 132, 199, 0.9), rgba(14, 165, 233, 0.9));
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: 600; font-size: 1.1rem;
            cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.5);
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s linear; /* Remove scale from hover if dragging */
            transform: translate(-50%, -50%); 
            z-index: 20;
            opacity: 0;
            user-select: none;
        }
        .hs-badge:not(.dragging):hover {
            background: linear-gradient(135deg, #059669, #10b981); /* Green hover */
            border-color: white;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.8);
        }

        /* Controls Overlay */
        #model-overlay {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 15, 30, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 15px 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15);
            text-align: center; opacity: 0; transition: opacity 0.5s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; gap: 10px;
            z-index: 40; pointer-events: none;
        }
        #model-overlay h2 { font-size: 1.25rem; font-weight: 500;}

        /* Admin UI */
        #admin-panel {
            position: absolute; top: 20px; right: 20px; z-index: 50;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border: 1px solid var(--accent); padding: 15px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 10px; display: none;
        }
        #admin-panel.active { display: flex; }
        .edit-switch { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: #fff;}
        .save-btn {
            background: #10b981; color: white; border: none; padding: 8px 15px; border-radius: 6px;
            cursor: pointer; font-family: inherit; font-weight: bold; font-size: 0.9rem; transition: 0.2s;
        }
        .save-btn:hover { background: #059669; }
        
        .dev-badge {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5);
            padding: 5px 15px; border-radius: 20px; border: 1px dashed #cbd5e1; cursor: pointer; color: #cbd5e1;
            z-index: 49;
        }

        /* Modal / Popup */
        #info-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 100;
        }
        #info-modal.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #0f172a; width: 550px; max-width: 90%; border-radius: 20px;
            border: 1px solid var(--border); padding: 30px; transform: translateY(20px); transition: 0.4s;
        }
        #info-modal.show .modal-content { transform: translateY(0); }
        .close-btn {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white;
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer; transition: 0.2s;
        }
        .close-btn:hover { background: #ef4444; }
        .modal-header { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .th-title { font-size: 1.6rem; font-weight: 600; color: #fff; margin-bottom: 5px; }
        .en-title { font-size: 1rem; color: var(--accent); font-weight: 400; text-transform: uppercase;}
        .modal-body { font-size: 1rem; line-height: 1.6; color: #cbd5e1; }

        #loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 9, 20, 0.8); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; transition: 0.4s; pointer-events: none; opacity: 0;
        }
        #loading.show { opacity: 1; pointer-events: auto; }
        .spinner { width: 45px; height: 45px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;}
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

    </script>
</head>
<body>

    <div class="bg-animation"></div>

    <div id="sidebar">

            <div class="logo">🧬 BioExplore 3D</div>

    <div id="info-modal">
        <div class="modal-content">

            </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        
        // --- FIREBASE SDK INTEGRATION (VERCEL READY) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // VERCEL / FIREBASE CONFIG [ให้เอา Config จากเว็บ Firebase ของคุณมาใส่ตรงนี้ตอนที่จะขึ้น Vercel]
        const firebaseConfig = {

        // ลบ Comment บรรทัดล่างออกเพื่อเปิดใช้งาน Firebase จริง
        // const app = initializeApp(firebaseConfig);
        // const firestoreDB = getFirestore(app);

        // --- DATABASE LOCAL (โหลดแสดงผลเริ่มต้น) ---
        const db = [
            { 
                id: 'neuron', 
                name: 'เซลล์ประสาท',
                thName: 'เซลล์ประสาทระบบสั่งการ',
                enName: 'Motor Neuron Anatomy',
                file: 'neuron.glb', 
                desc: 'คลิกวงกลมตัวเลขบน 3D เพื่อสแกนชิ้นส่วนแต่ละบริเวณ', 
                icon: '⚡',
                hotspots: [
                    { num: 1, pos: [-0.60, 0.60, 0.1],  name: 'Dendrites',        th: 'เดนไดรต์', desc: '<b>เดนไดรต์ (Dendrites)</b><br>ระยางค์ที่แตกแขนงคล้ายรากไม้แผ่ออกไปรอบๆ ส่วนนี้ทำหน้าที่<b>รับกระแสประสาท</b>เข้าสู่ตัวเซลล์บอดี้' },
                    { num: 2, pos: [-0.40, 0.05, 0.4],  name: 'Nucleus',          th: 'นิวเคลียส', desc: '<b>นิวเคลียส (Nucleus)</b><br>แกนกลางของเซลล์ประสาทที่เก็บสารพันธุกรรม ทำหน้าที่ควบคุมการทำงานและการเจริญเติบโตของเซลล์' },
                    { num: 3, pos: [-0.35, -0.15, 0.2], name: 'Cell body (Soma)',th: 'เซลล์บอดี้', desc: '<b>เซลล์บอดี้ (Soma)</b><br>ส่วนหลักของเซลล์ที่มีไซโตพลาซึมและออร์แกเนลล์อื่นๆ ที่ช่วยรักษาสภาพและผลิตโปรตีนเพื่อควบคุมเซลล์ประสาท' },
                    { num: 4, pos: [-0.20, -0.30, 0.1], name: 'Axon',             th: 'แอกซอน', desc: '<b>แอกซอน (Axon)</b><br>เส้นใยประสาทยาวเดี่ยวที่ทอดตัวออกจากเซลล์บอดี้ เพื่อ<b>ส่งกระแสสัญญาณประสาท</b>ออกไปยังเซลล์อื่นๆ' },
                    { num: 5, pos: [-0.05, -0.50, 0.2], name: 'Myelin Sheath',    th: 'เยื่อไมอีลิน', desc: '<b>เยื่อไมอีลิน (Myelin Sheath)</b><br>ปลอกไขมันทรงกระบอกที่พันรอบแอกซอน เป็นตัวฉนวนชั้นดี ช่วยให้กระแสประสาทเดินทางได้ไวและเสถียรขึ้น' },
                    { num: 6, pos: [0.15, -0.65, 0.2],  name: 'Schwann Cell',     th: 'เซลล์ชวานน์', desc: '<b>เซลล์ชวานน์ (Schwann Cell)</b><br>เซลล์ประกอบที่ห่อหุ้มอยู่กับเยื่อไมอีลิน ทำหน้าที่ผลิตสร้างและซ่อมแซมเยื่อไมอีลินในระบบประสาทรอบนอก' },
                    { num: 7, pos: [0.35, -0.75, 0.1],  name: 'Node of Ranvier',  th: 'โหนดออฟแรนเวียร์', desc: '<b>โหนดออฟแรนเวียร์ (Node of Ranvier)</b><br>คือรอยคอดหรือ "ช่องว่าง" ระหว่างปลอกไมอีลิน เป็นจุดที่กระแสไฟฟ้ากระโดดข้ามเพื่อเพิ่มความเร็วในการส่งสัญญาณได้อย่างทวีคูณ' },
                    { num: 8, pos: [0.80, -0.35, 0.2],  name: 'Axon terminals',   th: 'ปลายแอกซอน', desc: '<b>ปลายแอกซอน (Axon Terminals)</b><br>ส่วนปลายสุดของหางยาวที่แตกแขนงคล้ายปลาหมึก ทำหน้าที่หลั่งสารสื่อประสาท (Neurotransmitter) ข้ามไซแนปส์เพื่อสั่งการเซลล์ประสาทตัวถัดไป' }
                ]
            },
            {
                id: 'insect',
                name: 'แมลง',
                thName: 'กายวิภาคแมลง',
                enName: 'Insect Anatomy',
                file: 'insect.glb',
                desc: 'คลิกวงกลมตัวเลขบน 3D เพื่อสแกนชิ้นส่วนแต่ละบริเวณ',
                icon: '🐛',
                hotspots: [
                    { num: 1, pos: [0, 0, 0], name: 'Nervous System', th: 'ระบบประสาท', desc: '<b>ระบบประสาท (Nervous System)</b><br>ระบบประสาทตามยาวด้านท้อง (Ventral Nerve Cord) พร้อมปมประสาท' }
                ]
            }
        ];

        let currentModel = null;
        let activeSceneMesh = null;
        let htmlLabels = []; 
        let baseSizeGlobal = new THREE.Vector3(1,1,1);

        const container = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 2; controls.maxDistance = 30;

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        // ระบบจับพิกัดสำหรับ Edit Mode
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function createHotspots(modelData, baseSize) {
            htmlLabels.forEach(lbl => lbl.element.remove());
            htmlLabels = [];

            if(!modelData.hotspots) return;

            modelData.hotspots.forEach(hs => {
                const el = document.createElement('div');
                el.className = 'hs-badge';
                el.innerText = hs.num;
                
                // คลิกเปิด Modal
                el.onclick = (e) => {
                    const isEditMode = document.getElementById('edit-mode-toggle').checked;
                    if (isEditMode) return; // กั้นไม่ให้เปิด Modal ตอนที่กำลังจัดการพิกัด
                    document.getElementById('m-th-title').innerText = hs.th;
                    document.getElementById('m-en-title').innerText = hs.name;
                    document.getElementById('m-desc').innerHTML = hs.desc;
                    document.getElementById('info-modal').classList.add('show');
                };

                document.getElementById('main-view').appendChild(el);

                const anchor = new THREE.Object3D();
                anchor.position.set(
                    (hs.pos[0] * baseSize.x) / 2,
                    (hs.pos[1] * baseSize.y) / 2,
                    (hs.pos[2] * baseSize.z) / 2
                );
                activeSceneMesh.add(anchor);

                const labelObj = { element: el, anchor: anchor, hsData: hs, isDragging: false };
                htmlLabels.push(labelObj);

                // --- EDIT MODE: Drag and Drop Logic ---
                el.onmousedown = (e) => {
                    const isEditMode = document.getElementById('edit-mode-toggle').checked;
                    if (!isEditMode) return;

                    e.preventDefault();
                    labelObj.isDragging = true;
                    el.classList.add('dragging');
                    el.style.cursor = 'grabbing';
                    controls.enabled = false;

                    let tempX = 0, tempY = 0;

                    const onMouseMove = (ev) => {
                        const rect = container.getBoundingClientRect();
                        tempX = ev.clientX - rect.left;
                        tempY = ev.clientY - rect.top;
                        el.style.transform = `translate(-50%, -50%) translate(${tempX}px, ${tempY}px)`;
                    };

                    const onMouseUp = (ev) => {
                        labelObj.isDragging = false;
                        el.classList.remove('dragging');
                        el.style.cursor = 'pointer';
                        controls.enabled = true;
                        window.removeEventListener('mousemove', onMouseMove);
                        window.removeEventListener('mouseup', onMouseUp);

                        // ใช้ Raycaster หดทะลุลงไปหาพิกัดโลกสมมติ
                        const rect = container.getBoundingClientRect();
                        mouse.x = (tempX / container.clientWidth) * 2 - 1;
                        mouse.y = -(tempY / container.clientHeight) * 2 + 1;
                        raycaster.setFromCamera(mouse, camera);

                        const intersects = raycaster.intersectObject(activeSceneMesh, true);
                        if (intersects.length > 0) {
                            const hitWorld = intersects[0].point;
                            // อัปเดตสมอ 3 มิติ
                            anchor.position.copy(activeSceneMesh.worldToLocal(hitWorld.clone()));
                            
                            // อัปเดตพิกัด [X, Y, Z] ลงในข้อมูล Local ทันที
                            hs.pos[0] = (anchor.position.x * 2) / baseSize.x;
                            hs.pos[1] = (anchor.position.y * 2) / baseSize.y;
                            hs.pos[2] = (anchor.position.z * 2) / baseSize.z;
                            console.log(`Updated Hotspot #${hs.num} to:`, hs.pos);
                        }
                    };

                    window.addEventListener('mousemove', onMouseMove);
                    window.addEventListener('mouseup', onMouseUp);
                };
            });
        }

        window.saveToFirebase = async function() {
            if(!currentModel) return;
            const updatedHotspots = htmlLabels.map(l => l.hsData);
            
            try {
                // หากปลดล็อค Firebase Config แล้ว จะรันบรรทัดนี้ได้เลย!
                // await setDoc(doc(firestoreDB, "models", currentModel.id), { hotspots: updatedHotspots }, { merge: true });
                
                alert(`🔥 [FIREBASE MOCK] บันทึกพิกัดทั้งหมดของโมเดล [${currentModel.id}] ขึ้นฐานข้อมูลสำเร็จแล้ว!\n(ระบบจะจำค่าพิกัดที่คุณลากไว้จนกว่าจะรีเฟรช หากต้องการใช้งานจริง ให้นำ Auth Keys ใส่ในไฟล​์ HTML ครับ)`);
                console.log("JSON ที่จะส่งเข้า Firebase Cloud:", JSON.stringify(updatedHotspots));
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ Firebase: " + err);
            }
        }

        function loadModelIntoScene(modelData) {
            if(currentModel && currentModel.id === modelData.id) return; 
            currentModel = modelData;
            
            renderList(document.getElementById('search-input').value);
            document.getElementById('loading').classList.add('show');
            document.getElementById('model-overlay').style.opacity = 0;
            
            htmlLabels.forEach(lbl => lbl.element.remove());
            htmlLabels = [];

            if(activeSceneMesh) {
                scene.remove(activeSceneMesh);
                activeSceneMesh = null;
            }

            const loader = new GLTFLoader();
            loader.load(`./${modelData.file}`, (gltf) => {
                activeSceneMesh = gltf.scene;

                const box = new THREE.Box3().setFromObject(activeSceneMesh);
                const center = box.getCenter(new THREE.Vector3());
                baseSizeGlobal = box.getSize(new THREE.Vector3());
                
                activeSceneMesh.children.forEach(child => {
                    child.position.sub(center);
                });
                
                const maxDim = Math.max(baseSizeGlobal.x, baseSizeGlobal.y, baseSizeGlobal.z);
                activeSceneMesh.scale.setScalar(8 / maxDim);
                scene.add(activeSceneMesh);
                
                createHotspots(currentModel, baseSizeGlobal);

                document.getElementById('ov-title').innerText = modelData.name;
                document.getElementById('model-overlay').style.opacity = 1;
                document.getElementById('loading').classList.remove('show');
                
            }, undefined, (err) => {
                document.getElementById('loading-text').innerText = "❌ หาไฟล์ไม่พบ: " + modelData.file;
                setTimeout(() => document.getElementById('loading').classList.remove('show'), 2000);
            });
        }

        function updateHotspotPositions() {
            if(!activeSceneMesh) return;
            const w = container.clientWidth;
            const h = container.clientHeight;

            htmlLabels.forEach(lbl => {
                if(lbl.isDragging) return;

                const point = new THREE.Vector3();
                lbl.anchor.getWorldPosition(point);
                point.project(camera);

                if (point.z > 1) {
                    lbl.element.style.opacity = 0;
                } else {
                    lbl.element.style.opacity = 1;
                    const x = (point.x * 0.5 + 0.5) * w;
                    const y = (point.y * -0.5 + 0.5) * h;
                    lbl.element.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
            updateHotspotPositions(); 
        }
        animate();

        window.addEventListener('resize', () => {
             camera.aspect = container.clientWidth / container.clientHeight;
             camera.updateProjectionMatrix();
             renderer.setSize(container.clientWidth, container.clientHeight);
        });

        const listEl = document.getElementById('model-list');
        window.handleCardClick = function(id) { const m = db.find(x=>x.id===id); if(m) loadModelIntoScene(m); }
        function renderList(query = '') {
            listEl.innerHTML = '';
            const filtered = db.filter(m => m.name.toLowerCase().includes(query.toLowerCase()) || m.desc.toLowerCase().includes(query.toLowerCase()));
            filtered.forEach(m => {
                const isActive = currentModel && currentModel.id === m.id;
                listEl.innerHTML += `
                    <div class="model-card ${isActive ? 'active' : ''}" onclick="handleCardClick('${m.id}')">
                        <div class="model-icon">${m.icon}</div>
                        <div class="model-info"><h3>${m.name}</h3><p>${m.desc}</p></div>
                    </div>`;
            });
        }
        document.getElementById('search-input').addEventListener('input', (e) => renderList(e.target.value));

        window.openModal = function() {
            if(!currentModel) return;
            document.getElementById('m-th-title').innerText = currentModel.thName;
            document.getElementById('m-en-title').innerText = currentModel.enName;
            document.getElementById('m-desc').innerHTML = currentModel.fullDesc;
            document.getElementById('info-modal').classList.add('show');
        }
        window.closeModal = function() { document.getElementById('info-modal').classList.remove('show'); }

        // Start
        renderList();
        if(db.length > 0) loadModelIntoScene(db[0]);

    </script>
</body>
</html>

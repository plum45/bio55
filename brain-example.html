<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Brain Anatomy</title>
    <style>
        :root {
            --ui-bg: rgba(10, 15, 30, 0.85);
            --text: #e2e8f0;
            --accent: #38bdf8;
        }
        body { margin: 0; background-color: #020617; color: var(--text); font-family: 'Inter', -apple-system, sans-serif; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .header { position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none; }
        .header h1 { margin: 0; font-size: 2rem; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { margin-top: 5px; color: #94a3b8; font-size: 0.9rem; }
        
        #info-panel {
            position: absolute; top: 50%; right: 40px; transform: translateY(-50%);
            width: 350px; background: var(--ui-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease, transform 0.4s ease; z-index: 10;
        }
        #info-panel.active { opacity: 1; transform: translateY(-50%) translateX(0); pointer-events: auto; }
        
        .part-name { font-size: 1.5rem; color: var(--accent); margin-top: 0; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px;}
        .part-desc { font-size: 0.95rem; line-height: 1.6; color: #cbd5e1; margin-bottom: 1rem; }
        
        .icon { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        
        #tooltip { position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 6px 12px; border-radius: 6px; font-size: 14px; pointer-events: none; opacity: 0; z-index: 20; border: 1px solid var(--accent); transition: opacity 0.1s;}
        
        .instruction { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; pointer-events: none; backdrop-filter: blur(5px);}
        
        /* Loading Overlay */
        #loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #020617; display: flex; justify-content: center; align-items: center; z-index: 100; transition: opacity 1s; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <!-- Include GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading"><div class="spinner"></div></div>
    
    <div class="header">
        <h1>Human Brain Interface</h1>
        <p>Interactive Abstract Model - Click structural nodes to inspect</p>
    </div>
    
    <div id="tooltip">Brain Part</div>
    <div class="instruction">Hover to identify &bull; Click to view details</div>
    
    <div id="info-panel">
        <h2 class="part-name" id="p-name"><span class="icon" id="p-icon"></span>Frontal Lobe</h2>
        <p class="part-desc" id="p-desc">Responsible for higher cognitive functions such as memory, emotions, impulse control, problem solving, social interaction, and motor function.</p>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Data Dictionary for Brain Parts ---
        const brainData = {
            "Cerebrum": { color: 0x4ade80, desc: "ซีรีบรัม (สมองใหญ่) ทำหน้าที่เกี่ยวกับการเรียนรู้ ความคิด ความจำ การใช้เหตุผล และเป็นศูนย์กลางรับความรู้สึกต่างๆ รวมถึงการมองเห็น การได้ยิน และการสัมผัส" },
            "Cerebellum": { color: 0xf472b6, desc: "ซีรีเบลลัม (สมองน้อย) ทำหน้าที่ควบคุมการทรงตัวของร่างกาย และประสานการทำงานของกล้ามเนื้อให้เคลื่อนไหวได้อย่างราบรื่นและแม่นยำ" },
            "Brain Stem": { color: 0x94a3b8, desc: "ก้านสมอง (Brain Stem) เป็นส่วนที่เชื่อมต่อระหว่างสมองกับไขสันหลัง ควบคุมการทำงานพื้นฐานที่นอกเหนืออำนาจจิตใจ เช่น การหายใจ การเต้นของหัวใจ และความดันโลหิต" },
            "Thalamus": { color: 0xfbbf24, desc: "ทาลามัส (Thalamus) เปรียบเสมือนสถานีถ่ายทอดสัญญาณความรู้สึก ทำหน้าที่คัดกรองและส่งต่อกระแสประสาทรับความรู้สึกไปยังเปลือกสมองที่เหมาะสม (ยกเว้นเรื่องกลิ่น)" },
            "Hypothalamus": { color: 0xf87171, desc: "ไฮโปทาลามัส (Hypothalamus) ควบคุมรักษาความสมดุลในร่างกาย (Homeostasis) เช่น อุณหภูมิ ความหิว ความกระหาย การนอนหลับ และการสร้างฮอร์โมน" },
            "Hippocampus": { color: 0xa855f7, desc: "ฮิปโปแคมปัส (Hippocampus) มีความสำคัญอย่างมากต่อการเปลี่ยนความจำระยะสั้นให้กลายเป็นความจำระยะยาว และเกี่ยวข้องกับการเรียนรู้เชิงพื้นที่" }
        };

        // --- Basic Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020617, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 3;
        controls.maxDistance = 15;

        // --- Lights ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambient);

        const spotLight = new THREE.SpotLight(0xffffff, 2);
        spotLight.position.set(5, 5, 5);
        spotLight.angle = 0.5;
        spotLight.penumbra = 1;
        scene.add(spotLight);
        
        const blueLight = new THREE.PointLight(0x38bdf8, 2, 10);
        blueLight.position.set(-5, 2, -5);
        scene.add(blueLight);

        // --- Interactive Objects Array ---
        const interactiveMeshes = [];

        // --- Materials ---
        const outerGlassMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.1,
            transmission: 0.9, // glass-like
            thickness: 0.5,
            transparent: true,
            opacity: 1
        });

        // Helper to create glowing inner nodes
        function createBrainNode(name, geometry, position, sizeArr) {
            const data = brainData[name];
            
            // Inner Core Material
            const mat = new THREE.MeshStandardMaterial({
                color: data.color,
                emissive: data.color,
                emissiveIntensity: 0.2,
                roughness: 0.3,
            });

            const mesh = new THREE.Mesh(geometry, mat);
            mesh.position.set(...position);
            mesh.scale.set(...sizeArr);
            mesh.userData = { name: name, originalColor: data.color, originalScale: [...sizeArr] };
            
            scene.add(mesh);
            interactiveMeshes.push(mesh);
            return mesh;
        }

        // --- Construct Abstract Anatomy ---
        const brainGroup = new THREE.Group();
        scene.add(brainGroup);

        // 1. Transparent Shell (Cerebrum) - Represents the outer cortex
        const shellGeom = new THREE.SphereGeometry(1.8, 64, 32);
        shellGeom.scale(1, 0.8, 1.2);
        const shell = new THREE.Mesh(shellGeom, outerGlassMat);
        shell.position.set(0, 0.5, 0);
        shell.userData = { name: "Cerebrum", isShell: true }; // Make outer shell clickable too
        interactiveMeshes.push(shell);
        brainGroup.add(shell);

        // 2. Cerebrum Inner Core (Visual solid representation)
        createBrainNode("Cerebrum", new THREE.SphereGeometry(1.6, 32, 32), [0, 0.6, 0.2], [1, 0.7, 1.1]);
        
        // 3. Cerebellum (Back bottom)
        const cerebellumNode = createBrainNode("Cerebellum", new THREE.SphereGeometry(0.5, 32, 16), [0, -0.6, -1.2], [1, 0.8, 0.8]);
        
        // 4. Brain Stem
        createBrainNode("Brain Stem", new THREE.CylinderGeometry(0.2, 0.15, 1.5, 16), [0, -1, -0.2], [1, 1, 1]).rotation.x = 0.2;

        // 5. Thalamus (Center core)
        createBrainNode("Thalamus", new THREE.SphereGeometry(0.3, 32, 16), [0, 0.3, 0], [1, 0.8, 1.2]);

        // 6. Hypothalamus (Slightly front/below thalamus)
        createBrainNode("Hypothalamus", new THREE.SphereGeometry(0.15, 16, 16), [0, 0.1, 0.4], [1, 1, 1]);

        // 7. Hippocampus (Curved arch shape next to thalamus)
        const hippoCurve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, -0.2, -0.3),
            new THREE.Vector3(0.5, 0.2, 0),
            new THREE.Vector3(0.3, 0.4, 0.4),
        ]);
        const hippoGeom = new THREE.TubeGeometry(hippoCurve, 20, 0.1, 8, false);
        createBrainNode("Hippocampus", hippoGeom, [0, 0, 0], [1, 1, 1]);
        
        // Mirror hippocampus for left side
        const hippoCurveL = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, -0.2, -0.3),
            new THREE.Vector3(-0.5, 0.2, 0),
            new THREE.Vector3(-0.3, 0.4, 0.4),
        ]);
        const hippoGeomL = new THREE.TubeGeometry(hippoCurveL, 20, 0.1, 8, false);
        createBrainNode("Hippocampus", hippoGeomL, [0, 0, 0], [1, 1, 1]);

        // Put all nodes in group for animation
        interactiveMeshes.forEach(m => {
            if(!m.userData.isShell) brainGroup.add(m);
        });

        // --- Raycaster for Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        const tooltip = document.getElementById('tooltip');
        let hoveredObj = null;
        let selectedObj = null;

        window.addEventListener('mousemove', (e) => {
            // Update mouse pos
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            // Move tooltip
            tooltip.style.left = e.clientX + 15 + 'px';
            tooltip.style.top = e.clientY + 15 + 'px';

            raycaster.setFromCamera(mouse, camera);
            
            // Check intersection (ignore outer shell for hover so we can point to inner nodes easily)
            const intersects = raycaster.intersectObjects(interactiveMeshes);
            
            // Find first non-shell intersected object
            let hit = intersects.find(i => !i.object.userData.isShell);
            if(!hit && intersects.length > 0 && intersects[0].object.userData.isShell) {
                // If only hit shell
                hit = intersects[0];
            }

            if (hit) {
                const object = hit.object;
                
                if (hoveredObj !== object) {
                    // Reset previous hover
                    if (hoveredObj && hoveredObj !== selectedObj && !hoveredObj.userData.isShell) {
                        gsap.to(hoveredObj.material, { emissiveIntensity: 0.2, duration: 0.3 });
                        gsap.to(hoveredObj.scale, { 
                            x: hoveredObj.userData.originalScale[0], 
                            y: hoveredObj.userData.originalScale[1], 
                            z: hoveredObj.userData.originalScale[2], 
                            duration: 0.3 
                        });
                    }
                    
                    hoveredObj = object;
                    document.body.style.cursor = 'pointer';
                    tooltip.innerHTML = object.userData.name;
                    tooltip.style.opacity = 1;
                    
                    if (!object.userData.isShell) {
                        gsap.to(object.material, { emissiveIntensity: 0.8, duration: 0.3 });
                        gsap.to(object.scale, { 
                            x: object.userData.originalScale[0] * 1.05, 
                            y: object.userData.originalScale[1] * 1.05, 
                            z: object.userData.originalScale[2] * 1.05, 
                            duration: 0.3 
                        });
                    }
                }
            } else {
                if (hoveredObj) {
                    if (hoveredObj !== selectedObj && !hoveredObj.userData.isShell) {
                        gsap.to(hoveredObj.material, { emissiveIntensity: 0.2, duration: 0.3 });
                        gsap.to(hoveredObj.scale, { 
                            x: hoveredObj.userData.originalScale[0], 
                            y: hoveredObj.userData.originalScale[1], 
                            z: hoveredObj.userData.originalScale[2], 
                            duration: 0.3 
                        });
                    }
                    hoveredObj = null;
                    document.body.style.cursor = 'auto';
                    tooltip.style.opacity = 0;
                }
            }
        });

        window.addEventListener('click', () => {
            if (hoveredObj) {
                // Reset old selection
                if (selectedObj && !selectedObj.userData.isShell) {
                    gsap.to(selectedObj.material, { emissiveIntensity: 0.2, duration: 0.5 });
                }
                
                selectedObj = hoveredObj;
                
                const name = selectedObj.userData.name;
                const data = brainData[name];
                
                // Update UI
                const panel = document.getElementById('info-panel');
                document.getElementById('p-name').innerHTML = `<span class="icon" style="background:#${data.color.toString(16)}"></span>${name}`;
                document.getElementById('p-desc').innerText = data.desc;
                
                panel.classList.add('active');
                
                if (!selectedObj.userData.isShell) {
                    gsap.to(selectedObj.material, { emissiveIntensity: 1, duration: 0.3, yoyo: true, repeat: 1 });
                }
                
                // Camera focus logic (Optional)
                // gsap.to(controls.target, {
                //     x: selectedObj.position.x, y: selectedObj.position.y, z: selectedObj.position.z, duration: 1
                // });
            } else {
                // Click empty space
                document.getElementById('info-panel').classList.remove('active');
                if (selectedObj && !selectedObj.userData.isShell) {
                    gsap.to(selectedObj.material, { emissiveIntensity: 0.2, duration: 0.5 });
                }
                selectedObj = null;
            }
        });

        // --- Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Hide load screen
        document.getElementById('loading').style.opacity = 0;
        setTimeout(()=> document.getElementById('loading').remove(), 1000);

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            
            // Idle float
            const time = Date.now() * 0.001;
            brainGroup.position.y = Math.sin(time) * 0.05;
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioExplore 3D - ระบบวิเคราะห์กายวิภาค</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Three.js & OrbitControls -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        :root {
            --primary: #0f172a;
            --accent: #0ea5e9;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', 'Inter', sans-serif; }
        body { background: #020617; color: #f8fafc; overflow: hidden; height: 100vh; width: 100vw; }

        /* Animation backgrounds */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            z-index: -1; opacity: 0.5;
        }

        /* --- Sidebar --- */
        #sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 320px;
            background: var(--glass); backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border); z-index: 1000;
            display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #menu-toggle {
            position: fixed; top: 15px; left: 15px; z-index: 1100;
            background: var(--accent); color: white; border: none;
            width: 50px; height: 50px; border-radius: 12px; cursor: pointer;
            display: none; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3); font-size: 24px;
        }

        @media (max-width: 1024px) {
            #sidebar { width: 280px; transform: translateX(-100%); }
            #sidebar.active { transform: translateX(0); }
            #menu-toggle { display: flex; }
        }

        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--glass-border); }
        .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .sub-logo { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        .search-box { position: relative; margin-top: 15px; }
        #search-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 10px 10px 10px 35px; border-radius: 12px; color: white; font-size: 0.85rem; }

        #model-list { flex: 1; overflow-y: auto; padding: 15px; }
        .model-item {
            background: rgba(255, 255, 255, 0.03); border: 1px solid transparent; 
            border-radius: 16px; padding: 15px; margin-bottom: 12px; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; gap: 15px;
        }
        .model-item:hover { background: rgba(255, 255, 255, 0.06); }
        .model-item.active { background: rgba(14, 165, 233, 0.1); border-color: var(--accent); }
        .model-icon { width: 45px; height: 45px; background: rgba(0,0,0,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .model-info h3 { font-size: 0.95rem; margin-bottom: 4px; }
        .model-info p { font-size: 0.75rem; color: #64748b; line-height: 1.3; }

        /* --- Main View --- */
        #main-view { position: relative; width: 100%; height: 100vh; transition: margin-left 0.3s; }
        @media (min-width: 1025px) { #main-view { margin-left: 320px; width: calc(100% - 320px); } }

        #three-canvas { width: 100%; height: 100%; cursor: grab; }
        #three-canvas:active { cursor: grabbing; }

        /* --- Hotspots --- */
        .hotspot-label {
            position: absolute; width: 34px; height: 34px; background: var(--accent);
            color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 14px; cursor: pointer; 
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.4);
            border: 2px solid white; pointer-events: auto; user-select: none; transition: transform 0.2s;
            z-index: 10;
        }
        @media (max-width: 768px) { .hotspot-label { width: 42px; height: 42px; font-size: 18px; } }
        .hotspot-label.active { background: #f43f5e; transform: scale(1.15); box-shadow: 0 0 25px rgba(244, 63, 94, 0.6); }

        #leader-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* --- Info Panel --- */
        #info-panel {
            position: fixed; right: 25px; top: 25px; width: 340px;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            z-index: 1200; transform: translateX(500px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        #info-panel.visible { transform: translateX(0); }

        @media (max-width: 768px) {
            #info-panel {
                left: 0; right: 0; bottom: 0; top: auto; width: 100%;
                border-radius: 30px 30px 0 0; transform: translateY(100%);
                padding-bottom: 40px; border: none; border-top: 1px solid var(--glass-border);
            }
            #info-panel.visible { transform: translateY(0); }
        }

        .panel-accent { position: absolute; top: 0; left: 25px; right: 25px; height: 4px; background: var(--accent); border-radius: 0 0 4px 4px; }
        .panel-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #64748b; font-size: 22px; cursor: pointer; padding: 5px; }
        .panel-num { width: 40px; height: 40px; background: var(--accent); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; margin-right: 12px; color: white; }
        .panel-th { font-size: 1.3rem; font-weight: 700; color: #fff; vertical-align: middle; }
        .panel-en { display: block; font-size: 0.85rem; color: var(--accent); font-weight: 600; margin: 15px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .panel-desc { line-height: 1.6; color: #cbd5e1; font-size: 0.95rem; }

        /* --- Admin UI --- */
        /* --- Admin UI & Login --- */
        #admin-auth-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(20px); z-index: 3000;
            display: none; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        #admin-auth-overlay.visible { display: flex; }
        .auth-card {
            background: var(--glass); padding: 40px; border-radius: 30px;
            border: 1px solid var(--glass-border); width: 320px; text-align: center;
        }
        .auth-card h3 { margin-bottom: 20px; font-weight: 800; color: #fff; }
        .auth-card input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 15px; color: white; text-align: center; font-size: 1.5rem;
            letter-spacing: 5px; margin-bottom: 20px;
        }

        .dev-badge { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: #64748b; font-size: 0.8rem; cursor: pointer; z-index: 100; backdrop-filter: blur(10px); }
        #admin-panel {
            position: fixed; bottom: 80px; right: 20px; width: 280px;
            background: var(--glass); backdrop-filter: blur(20px); border-radius: 20px;
            border: 1px solid var(--glass-border); padding: 20px; z-index: 100;
            transform: scale(0.9) translateY(20px); opacity: 0; pointer-events: none; transition: all 0.3s;
        }
        #admin-panel.active { transform: scale(1) translateY(0); opacity: 1; pointer-events: auto; }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        #loading.show { opacity: 1; pointer-events: auto; }
        .spinner { width: 45px; height: 45px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <button id="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('active')">☰</button>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="logo">🧬 BioExplore 3D</div>
            <div class="sub-logo">ระบบวิเคราะห์กายวิภาคเสมือนจริง</div>
            <div class="search-box">
                <span style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.4;">🔍</span>
                <input type="text" id="search-input" placeholder="ค้นหาโมเดล...">
            </div>
        </div>
        <div id="model-list"></div>
    </div>

    <div id="main-view">
        <div id="loading"><div class="spinner"></div><div style="color: grey;">กำลังโหลดข้อมูล 3D...</div></div>
        <canvas id="three-canvas"></canvas>
        <svg id="leader-svg"></svg>

        <div id="info-panel">
            <div class="panel-accent"></div>
            <button class="panel-close" onclick="closeInfoPanel()">×</button>
            <div id="info-content">
                <div style="display: flex; align-items: center;">
                    <div class="panel-num" id="info-num">1</div>
                    <span class="panel-th" id="info-th">ชื่อภาษาไทย</span>
                </div>
                <span class="panel-en" id="info-en">ENGLISH NAME</span>
                <div class="panel-desc" id="info-desc">คำอธิบายทางวิชาการ</div>
            </div>
        </div>

        <div class="dev-badge" onclick="toggleAdminAuth()">🔧 Admin Mode</div>
        <div id="admin-panel">
            <div class="admin-title">บันทึกข้อมูลไปยัง CLOUD</div>
            <label class="edit-switch">
                <input type="checkbox" id="edit-mode"> 
                <span>เปิดโหมดแก้ไข (ลากจุดได้)</span>
            </label>
            <div style="font-size: 0.7rem; color: #64748b; margin-bottom: 10px;">
                * ในโหมดแก้ไข Double Click บนโมเดลเพื่อสร้างจุดใหม่
            </div>
            <div id="drag-log" style="font-size: 0.75rem; color: #0ea5e9; margin-bottom: 15px; font-weight: bold; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; text-align: center;">พร้อมแก้ไข...</div>
            <button class="save-btn" id="save-firebase-btn">SAVE TO FIREBASE</button>
        </div>

        <!-- Admin Login Overlay -->
        <div id="admin-auth-overlay">
            <div class="auth-card">
                <h3>Admin Login</h3>
                <input type="password" id="admin-pass" placeholder="••••">
                <button class="save-btn" onclick="checkAdminAuth()">Login</button>
                <button style="background:none; border:none; color:#64748b; margin-top:15px; cursor:pointer;" onclick="toggleAdminAuth()">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Firebase Setup
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            authDomain: "bio55-52faa.firebaseapp.com",
            projectId: "bio55-52faa",
            storageBucket: "bio55-52faa.appspot.com",
            messagingSenderId: "338954495576",
            appId: "1:338954495576:web:651c6b306443c224213d2a"
        };
        const app = initializeApp(firebaseConfig);
        const firestoreDB = getFirestore(app);

        const db = [
            { 
                id: 'neuron', 
                name: 'เซลล์ประสาท',
                file: 'neuron.glb', 
                desc: 'ศึกษากลไกลการทำงานของ "หน่วยประมวลผลพื้นฐาน" และการส่งกระแสประสาท (Nerve Impulse)', 
                icon: '⚡',
                hotspots: [
                    { num: 1, pos: [0.65, 0.7, 0.4],  name: 'Dendrites',        th: 'เดนไดรต์', desc: '<b>เดนไดรต์ (Dendrites)</b><br>ใยประสาทที่แตกแขนงคล้ายรากไม้ ทำหน้าที่เป็น "ตัวรับ" สัญญาณไฟฟ้าหรือกระแสประสาทจากเซลล์อื่นๆ เข้าสู่ตัวเซลล์ประสาท' },
                    { num: 2, pos: [0.502, -0.029, 0.549],  name: 'Nucleus',          th: 'นิวเคลียส', desc: '<b>นิวเคลียส (Nucleus)</b><br>ศูนย์กลางควบคุมการทำงานของเซลล์ ภายในบรรจุสารพันธุกรรม (DNA) และควบคุมหลักการทำงานพื้นฐานทั้งหมดของเซลล์ประสาท' },
                    { num: 3, pos: [0.409, 0.201, 0.489], name: 'Cell body (Soma)', th: 'เซลล์บอดี้', desc: '<b>เซลล์บอดี้ (Soma)</b><br>ส่วนที่บรรจุออร์แกเนลล์สำคัญ ทำหน้าที่ประมวลผลข้อมูลที่รับมาจากเดนไดรต์ และเป็นแหล่งสังเคราะห์พลังงานและโปรตีนที่จำเป็นต่อชีวิต' },
                    { num: 4, pos: [0.37, -0.244, 0.47], name: 'Axon',             th: 'แอกซอน', desc: '<b>แอกซอน (Axon)</b><br>เส้นใยเดี่ยวที่ยาวที่สุด ทำหน้าที่เป็น "ตัวส่ง" สัญญาณไฟฟ้าออกจากตัวเซลล์เพื่อนำข้อมูลไปยังเซลล์เป้าหมายระยะไกล' },
                    { num: 5, pos: [0.35, -0.65, 0.4],  name: 'Node of Ranvier',  th: 'โหนดออฟแรนเวียร์', desc: '<b>โหนดออฟแรนเวียร์</b><br>รอยต่อระหว่างปลอกไมอีลินที่ช่วยให้กระแสไฟฟ้าสามารถ "กระโดด" ข้ามไปได้อย่างรวดเร็ว (Saltatory conduction) ช่วยเร่งความเร็วในการส่งสัญญาณ' },
                    { num: 6, pos: [0.334, -0.621, -0.748], name: 'Axon terminals',   th: 'ปลายแอกซอน', desc: '<b>ปลายแอกซอน</b><br>ส่วนปลายสุดที่ทำหน้าที่หลั่งสารสื่อประสาท (Neurotransmitters) เพื่อถ่ายโอนสัญญาณข้ามช่องว่างไซแนปส์ (Synapse) ไปยังเซลล์ถัดไป' },
                    { num: 7, pos: [0.15, -0.55, 0.45], name: 'Myelin Sheath', th: 'เยื่อไมอีลิน', desc: '<b>เยื่อไมอีลิน (Myelin Sheath)</b><br>ปลอกไขมันที่หุ้มรอบแอกซอน ทำหน้าที่เป็นฉนวนไฟฟ้า ช่วยให้กระแสประสาทเดินทางได้เร็วขึ้นและป้องกันการสูญเสียสัญญาณระหว่างทาง' }
                ]
            },
            {
                id: 'flatworm',
                name: 'พลานาเรีย',
                file: 'flatworm.glb',
                desc: 'วิเคราะห์ "ระบบประสาทแบบขั้นบันได" (Ladder-type) ของสัตว์ที่มีสมมาตรด้านซ้ายขวา',
                icon: '🐛',
                hotspots: [
                    { num: 1, pos: [0.765, 0.369, -0.706], name: 'Eyespots', th: 'จุดตา', desc: '<b>จุดตา (Eyespots/Ocelli)</b><br>อวัยวะรับความรู้สึก (Sensory organ) เชื่อมต่อกับเส้นประสาทหัว ทำหน้าที่รับความเข้มแสงเพื่อส่งสัญญาณให้ปมประสาทประมวลผลการเคลื่อนที่หนีแสง' },
                    { num: 2, pos: [0.655, 0.226, -0.709], name: 'Cerebral Ganglia', th: 'ปมประสาทสมอง', desc: '<b>ปมประสาทสมอง (Cephalization)</b><br>จุดเริ่มต้นของวิวัฒนาการสมอง เป็นกลุ่มเซลล์ประสาทหนาแน่นที่ส่วนหัว ทำหน้าที่เป็นศูนย์กลางประมวลผลสัญญาณจากสิ่งเร้า' },
                    { num: 3, pos: [-0.019, 0.506, -0.7], name: 'Transverse Nerves', th: 'เส้นประสาทตามขวาง', desc: '<b>เส้นประสาทตามขวาง</b><br>เส้นประสาทที่เชื่อมระหว่างเส้นประสาทแนวยาวสองข้าง สร้างโครงสร้างแบบ "ขั้นบันได (Ladder-type)" ช่วยให้การสื่อสารระหว่างสองฝั่งลำตัวเป็นไปอย่างมีระบบ' },
                    { num: 4, pos: [0.248, 0.254, -0.88], name: 'Longitudinal Nerve Cords', th: 'เส้นประสาทแนวยาว', desc: '<b>เส้นประสาทแนวยาว</b><br>ใยประสาทหลักที่ทอดขนานไปตามความยาวลำตัว ทำหน้าที่ส่งสัญญาณประสาทจากส่วนหัวไปยังส่วนปลายของร่างกาย' }
                ]
            },
            {
                id: 'hydra',
                name: 'ไฮดรา',
                file: 'hydra.glb',
                desc: 'ศึกษา "ระบบประสาทแบบร่างแห" (Nerve Net) ซึ่งเป็นวิวัฒนาการแรกเริ่มของเครือข่ายความรู้สึก',
                icon: '🐙',
                hotspots: [
                    { num: 1, pos: [0.299, 0.524, 0.515], name: 'Sensory Cells on Tentacles', th: 'เซลล์รับความรู้สึกบริเวณหนวด', desc: '<b>เซลล์ประสาทที่หนวด</b><br>ทำหน้าที่รับสัมผัสจากเหยื่อและกระตุ้นเซลล์เข็มพิษ (Nematocyst) โดยตรง โดยไม่ต้องผ่านศูนย์กลางสมอง' },
                    { num: 2, pos: [0.057, 0.565, 0.08], name: 'Hypostome Nerve Net', th: 'ข่ายประสาทรอบปาก', desc: '<b>ข่ายประสาทรอบปาก</b><br>มีความหนาแน่นของเซลล์ประสาทสูง ทำหน้าที่ควบคุมการเปิด-ปิดของปากเมื่อได้รับการกระตุ้นสารเคมีจากเหยื่อ' },
                    { num: 3, pos: [0.191, -0.175, -0.056], name: 'Diffuse Nerve Net', th: 'ระบบประสาทแบบร่างแห', desc: '<b>ระบบประสาทแบบร่างแห (Nerve Net)</b><br>กลุ่มเซลล์ประสาทที่เชื่อมโยงกันทั่วร่างกายโดยไม่มีศูนย์กลางการทำงาน (Decentralized) สัญญาณจะแผ่กระจายไปทุกทิศทาง' },
                    { num: 4, pos: [0.117, -0.697, -0.067], name: 'Basal Disk Response', th: 'การตอบสนองส่วนฐาน', desc: '<b>การตอบสนองที่ส่วนฐาน</b><br>รับสัญญาณจากข่ายประสาทร่างแหเพื่อควบคุมการยืด-หดตัวของลำตัว และการยึดเกาะกับวัตถุ' }
                ]
            }
        ];

        let currentModel = null;
        let activeSceneMesh = null;
        let htmlLabels = [];
        let leaderLines = [];
        const container = document.getElementById('three-canvas');
        const leaderSVG = document.getElementById('leader-svg');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 0, 12);

        const renderer = new THREE.WebGLRenderer({ canvas: container, antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const light1 = new THREE.DirectionalLight(0xffffff, 2.5); light1.position.set(10, 10, 10); scene.add(light1);
        const light2 = new THREE.DirectionalLight(0x0ea5e9, 1.5); light2.position.set(-10, -5, -10); scene.add(light2);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const loader = new GLTFLoader();

        function renderList(search = '') {
            const list = document.getElementById('model-list');
            list.innerHTML = '';
            db.filter(m => m.name.toLowerCase().includes(search.toLowerCase())).forEach(model => {
                const div = document.createElement('div');
                div.className = `model-item ${currentModel?.id === model.id ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="model-icon">${model.icon}</div>
                    <div class="model-info">
                        <h3>${model.name}</h3>
                        <p>${model.desc}</p>
                    </div>
                `;
                div.onclick = () => {
                    if (window.innerWidth <= 1024) document.getElementById('sidebar').classList.remove('active');
                    loadModelIntoScene(model);
                };
                list.appendChild(div);
            });
        }

        async function loadModelIntoScene(modelData) {
            if (activeSceneMesh) {
                scene.remove(activeSceneMesh);
                activeSceneMesh = null;
            }
            htmlLabels.forEach(l => l.element.remove());
            htmlLabels = [];
            leaderSVG.innerHTML = '';
            
            currentModel = modelData;
            controls.reset();
            camera.position.set(0, 0, 12);
            renderList();

            document.getElementById('loading').classList.add('show');

            try {
                const docRef = doc(firestoreDB, "models", modelData.id);
                const saved = await getDoc(docRef);
                if (saved.exists()) modelData.hotspots = saved.data().hotspots;
            } catch (e) { console.warn("Load failed", e); }

            loader.load(modelData.file, (gltf) => {
                activeSceneMesh = gltf.scene;
                
                // Centering & Auto-Scaling
                const box = new THREE.Box3().setFromObject(activeSceneMesh);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                // ขยายให้ขนาดพอดีกับมาตราส่วนมาตรฐาน (ประมาณ 5-8 หน่วย)
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 8 / maxDim;
                activeSceneMesh.scale.setScalar(scale);
                
                // ปรับให้กึ่งกลาง
                activeSceneMesh.position.sub(center.multiplyScalar(scale));
                
                scene.add(activeSceneMesh);
                
                // ปรับมุมกล้องให้เห็นภาพรวมสวยๆ
                camera.position.set(0, 0, 12);
                controls.target.set(0, 0, 0);
                controls.update();

                createHotspots(modelData.hotspots);
                document.getElementById('loading').classList.remove('show');
            });
        }

        function createHotspots(hotspots) {
            hotspots.forEach(h => {
                const div = document.createElement('div');
                div.className = 'hotspot-label';
                div.innerHTML = h.num;
                div.setAttribute('data-num', h.num);
                document.body.appendChild(div);

                // --- DRAG LOGIC ---
                const labelObj = { element: div, pos: new THREE.Vector3(...h.pos), data: h };
                
                div.addEventListener('mousedown', (e) => {
                    if (!document.getElementById('edit-mode').checked) return;
                    activeDragLabel = { element: div, data: h, labelObj: labelObj };
                    controls.enabled = false; 
                    e.stopPropagation();
                });

                div.onclick = (e) => {
                    if (activeDragLabel) return;
                    showInfo(h, div);
                };

                htmlLabels.push(labelObj);
            });
        }

        function showInfo(h, el) {
            htmlLabels.forEach(l => l.element.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('info-num').innerText = h.num;
            document.getElementById('info-th').innerText = h.th;
            document.getElementById('info-en').innerText = h.name;
            document.getElementById('info-desc').innerHTML = h.desc || 'ไม่มีคำอธิบายในขณะนี้';
            document.getElementById('info-panel').classList.add('visible');
        }

        window.closeInfoPanel = () => {
            document.getElementById('info-panel').classList.remove('visible');
            htmlLabels.forEach(l => l.element.classList.remove('active'));
        };

        let activeDragLabel = null;

        // ดับเบิลคลิกเพื่อสร้างจุดใหม่
        container.addEventListener('dblclick', (e) => {
            if (!document.getElementById('edit-mode').checked || !activeSceneMesh) return;
            
            const rect = container.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((e.clientX - rect.left) / rect.width) * 2 - 1,
                -((e.clientY - rect.top) / rect.height) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(activeSceneMesh, true);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                // แปลงพิกัดโลกกลับเป็นพิกัด Local ของโมเดลเพื่อบันทึก
                const localPoint = activeSceneMesh.worldToLocal(point.clone());
                const nextNum = currentModel.hotspots.length > 0 ? Math.max(...currentModel.hotspots.map(h => h.num)) + 1 : 1;
                
                const newH = {
                    num: nextNum,
                    pos: [localPoint.x, localPoint.y, localPoint.z],
                    name: 'New Spot',
                    th: 'จุดใหม่',
                    desc: 'คลิกโหมดแก้ไขเพื่อปรับปรุงเนื้อหา'
                };
                
                currentModel.hotspots.push(newH);
                createHotspots([newH]);
            }
        });

        // ลอจิกการลากจุด
        window.addEventListener('mousemove', (e) => {
            if (!activeDragLabel || !activeSceneMesh) return;

            const rect = container.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((e.clientX - rect.left) / rect.width) * 2 - 1,
                -((e.clientY - rect.top) / rect.height) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(activeSceneMesh, true);
            
            if (intersects.length > 0) {
                const worldPoint = intersects[0].point;
                const localPoint = activeSceneMesh.worldToLocal(worldPoint.clone());
                
                // อัปเดตทั้งตำแหน่งในฉากและข้อมูลสำหรับบันทึก
                activeDragLabel.labelObj.pos.copy(localPoint);
                activeDragLabel.data.pos = [localPoint.x, localPoint.y, localPoint.z];

                // อัปเดต UI Log เพื่อให้กูเห็น
                document.getElementById('drag-log').innerText = `จุดที่ ${activeDragLabel.data.num}: [${localPoint.x.toFixed(3)}, ${localPoint.y.toFixed(3)}, ${localPoint.z.toFixed(3)}]`;
            }
        });

        window.addEventListener('mouseup', () => {
            if (activeDragLabel) {
                activeDragLabel = null;
                controls.enabled = true; // เปิดการหมุนกล้องคืน
            }
        });

        // Firebase Save
        document.getElementById('save-firebase-btn').onclick = async () => {
            if (!currentModel) return;
            const btn = document.getElementById('save-firebase-btn');
            btn.innerText = "กำลังบันทึก...";
            try {
                await setDoc(doc(firestoreDB, "models", currentModel.id), {
                    hotspots: currentModel.hotspots
                });
                alert("บันทึกข้อมูลเรียบร้อย!");
            } catch (e) { alert("Error: " + e.message); }
            btn.innerText = "SAVE TO FIREBASE";
        };

        function updateHotspotPositions() {
            leaderSVG.innerHTML = '';
            if (!activeSceneMesh) return;

            const rect = container.getBoundingClientRect();
            // ระยะ Sidebar (ถ้าจอใหญ่)
            const sidebarWidth = (window.innerWidth <= 1024) ? 0 : 320;

            htmlLabels.forEach(label => {
                const wp = label.pos.clone();
                // นำพิกัดโลกมาใช้ (ซึ่งต้องคำนวณจาก Matrix ของโมเดล)
                activeSceneMesh.updateMatrixWorld();
                wp.applyMatrix4(activeSceneMesh.matrixWorld);

                const screenPos = wp.project(camera);
                
                // คำนวณพิกัดหน้าจอ
                const x = (screenPos.x * 0.5 + 0.5) * rect.width;
                const y = (-(screenPos.y * 0.5) + 0.5) * rect.height;

                if (screenPos.z > 1) {
                    label.element.style.display = 'none';
                    return;
                }
                
                label.element.style.display = 'flex';
                label.element.style.left = `${x + sidebarWidth - (label.element.clientWidth / 2)}px`;
                label.element.style.top = `${y - (label.element.clientHeight / 2)}px`;

                if (label.element.classList.contains('active')) {
                    const infoRect = document.getElementById('info-panel').getBoundingClientRect();
                    const targetX = (window.innerWidth <= 768) ? window.innerWidth / 2 : infoRect.left;
                    const targetY = (window.innerWidth <= 768) ? infoRect.top : infoRect.top + 50;
                    
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const startX = x + sidebarWidth;
                    const d = `M ${startX} ${y} Q ${startX + (targetX - startX) * 0.5} ${y}, ${targetX} ${targetY}`;
                    
                    path.setAttribute("d", d);
                    path.setAttribute("stroke", "#0ea5e9");
                    path.setAttribute("stroke-width", "2");
                    path.setAttribute("fill", "none");
                    path.setAttribute("stroke-dasharray", "5,5");
                    leaderSVG.appendChild(path);
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
            updateHotspotPositions();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // --- Admin Security ---
        window.toggleAdminAuth = function() {
            const overlay = document.getElementById('admin-auth-overlay');
            const panel = document.getElementById('admin-panel');
            if (panel.classList.contains('active')) {
                panel.classList.remove('active');
            } else {
                overlay.classList.add('visible');
                document.getElementById('admin-pass').focus();
            }
        }

        window.checkAdminAuth = function() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === '2526') {
                document.getElementById('admin-auth-overlay').classList.remove('visible');
                document.getElementById('admin-panel').classList.add('active');
                document.getElementById('admin-pass').value = '';
            } else {
                alert('รหัสผ่านไม่ถูกต้อง');
            }
        }

        renderList();
        loadModelIntoScene(db[0]);
    </script>
</body>
</html>
